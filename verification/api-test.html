<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Music Engine — API Verification</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #1a1a1a; --border: #2e2e2e;
    --text: #e8e8e8; --muted: #888; --accent: #fc3c44;
    --ok: #34c759; --warn: #ffd60a; --err: #ff453a;
    --mono: "SF Mono", "Fira Code", monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif;
         font-size: 14px; line-height: 1.5; padding: 24px; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 12px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: 340px 1fr; gap: 20px; }
  .panel { background: var(--surface); border: 1px solid var(--border);
           border-radius: 10px; padding: 16px; }
  .panel h2 { font-size: 12px; font-weight: 600; text-transform: uppercase;
              letter-spacing: .08em; color: var(--muted); margin-bottom: 12px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  input, select { width: 100%; background: var(--bg); border: 1px solid var(--border);
                  color: var(--text); border-radius: 6px; padding: 7px 10px;
                  font-size: 13px; margin-bottom: 10px; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  button { background: var(--accent); color: #fff; border: none; border-radius: 6px;
           padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
           margin: 3px; transition: opacity .15s; }
  button:hover { opacity: .85; }
  button.secondary { background: var(--border); color: var(--text); }
  .btn-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block;
                margin-right: 6px; background: var(--muted); }
  .status-dot.ok  { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .status-dot.err { background: var(--err); box-shadow: 0 0 6px var(--err); }
  .status-dot.warn { background: var(--warn); }
  #log { font-family: var(--mono); font-size: 12px; background: var(--bg);
         border: 1px solid var(--border); border-radius: 8px; padding: 12px;
         height: 340px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
  .log-ok   { color: var(--ok); }
  .log-err  { color: var(--err); }
  .log-warn { color: var(--warn); }
  .log-dim  { color: var(--muted); }
  .log-json { color: #7dd3fc; }
  section { margin-bottom: 20px; }
  section:last-child { margin-bottom: 0; }
  .tag { display: inline-block; font-size: 10px; font-weight: 700;
         padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
  .tag.get    { background: #22543d; color: #68d391; }
  .tag.post   { background: #44337a; color: #d6bcfa; }
  .tag.delete { background: #63171b; color: #feb2b2; }
  audio, video { width: 100%; margin-top: 8px; border-radius: 8px; }
  #artwork-img { width: 120px; height: 120px; border-radius: 8px;
                 object-fit: cover; display: none; margin-top: 8px; }
  #sse-log { font-family: var(--mono); font-size: 11px; color: var(--muted);
             height: 80px; overflow-y: auto; background: var(--bg);
             border: 1px solid var(--border); border-radius: 6px;
             padding: 8px; margin-top: 8px; white-space: pre; }
  .result-box { background: var(--bg); border: 1px solid var(--border);
                border-radius: 6px; padding: 10px; margin-top: 8px;
                font-family: var(--mono); font-size: 11px; color: #7dd3fc;
                max-height: 160px; overflow-y: auto; }
  .export-row { display: flex; gap: 8px; align-items: flex-end; }
  .export-row input { flex: 1; margin-bottom: 0; }
  .pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
          padding: 3px 8px; border-radius: 20px; background: var(--border); }
  .pill.active { background: #1a3a1a; color: var(--ok); }
  .check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .check-row input[type=checkbox] { width: auto; margin: 0; }
</style>
</head>
<body>

<h1>Apple Music Engine <span>API Verification</span></h1>
<p class="subtitle">Visual end-to-end check — every engine endpoint in one page</p>

<div class="grid">
<!-- ── Left: config + controls ─────────────────────────────────── -->
<div>

<div class="panel" style="margin-bottom:16px">
  <h2>Connection</h2>
  <label>Engine base URL</label>
  <input id="base" value="http://127.0.0.1:8080">
  <button onclick="checkStatus()">Connect</button>
  <span id="conn-status"><span class="status-dot" id="dot"></span><span id="conn-text">not checked</span></span>
</div>

<div class="panel" style="margin-bottom:16px">
  <h2>Track</h2>
  <label>Adam ID</label>
  <input id="adamId" placeholder="e.g. 1488408568" value="">
  <label>Storefront</label>
  <input id="storefront" value="us">
  <label>Quality</label>
  <select id="quality">
    <option value="aac">AAC 256 kbps</option>
    <option value="alac" selected>ALAC (lossless)</option>
    <option value="atmos">Dolby Atmos</option>
    <option value="video">Music Video</option>
  </select>
</div>

<div class="panel" style="margin-bottom:16px">
  <h2>Core API <span class="tag get">GET</span></h2>
  <div class="btn-row">
    <button onclick="testStatus()">Status</button>
    <button onclick="testCapabilities()">Capabilities</button>
    <button onclick="testMetadata()">Metadata</button>
    <button onclick="testArtwork()">Artwork</button>
    <button onclick="testLyrics()">Lyrics</button>
  </div>
  <img id="artwork-img" alt="artwork">
  <div id="meta-result" class="result-box" style="display:none"></div>
</div>

<div class="panel" style="margin-bottom:16px">
  <h2>Error Handling</h2>
  <div class="btn-row">
    <button onclick="testError(404)" class="secondary">404 bad ID</button>
    <button onclick="testError(401)" class="secondary">401 no auth</button>
    <button onclick="testMetadataBadID()" class="secondary">metadata 404</button>
    <button onclick="testLyricsUnavail()" class="secondary">lyrics unavailable</button>
  </div>
</div>

<div class="panel">
  <h2>Export <span class="tag post">POST</span></h2>
  <label>Output directory</label>
  <input id="exportDir" placeholder="/home/user/Music">
  <div class="check-row">
    <input type="checkbox" id="embedArt" checked>
    <label style="margin:0">Embed artwork</label>
    <input type="checkbox" id="embedLrc" checked>
    <label style="margin:0">Embed lyrics</label>
  </div>
  <div class="check-row">
    <input type="checkbox" id="lrcSidecar">
    <label style="margin:0">Save .lrc sidecar</label>
    <input type="checkbox" id="convertFlac">
    <label style="margin:0">Convert to FLAC</label>
  </div>
  <label>Filename template</label>
  <input id="tmpl" value="{album_artist}/{album}/{track_number:02d} - {title}">
  <div class="btn-row">
    <button onclick="exportTrack()">Export track</button>
    <button onclick="listExports()" class="secondary">List jobs</button>
  </div>
  <div id="export-result" class="result-box" style="display:none"></div>
</div>

</div><!-- end left -->

<!-- ── Right: playback + log ─────────────────────────────────── -->
<div>

<div class="panel" style="margin-bottom:16px">
  <h2>Playback <span class="tag post">POST</span> <span class="tag get">GET</span></h2>
  <div class="btn-row">
    <button onclick="createSession()">Create session</button>
    <button onclick="deleteSession()" class="secondary">Delete session</button>
  </div>
  <div id="session-info" style="font-size:12px; color:var(--muted); margin-bottom:8px">
    No session.
  </div>
  <div id="audio-section" style="display:none">
    <label>Audio stream</label>
    <audio id="player" controls></audio>
  </div>
  <div id="video-section" style="display:none">
    <label>Video stream</label>
    <video id="vplayer" controls></video>
  </div>
</div>

<div class="panel" style="margin-bottom:16px">
  <h2>Concurrent sessions</h2>
  <div class="btn-row">
    <button onclick="concurrentTest(3)">3 simultaneous</button>
    <button onclick="concurrentTest(5)">5 simultaneous</button>
    <button onclick="cancelDuringStream()">Cancel mid-stream</button>
  </div>
  <div id="concurrent-result" class="result-box" style="display:none"></div>
</div>

<div class="panel" style="margin-bottom:16px">
  <h2>SSE events <span class="tag get">GET</span></h2>
  <div class="btn-row">
    <button onclick="startSSE()">Subscribe</button>
    <button onclick="stopSSE()" class="secondary">Unsubscribe</button>
  </div>
  <div id="sse-status" class="pill">disconnected</div>
  <div id="sse-log"></div>
</div>

<div class="panel">
  <h2>Request log</h2>
  <div class="btn-row">
    <button onclick="clearLog()" class="secondary" style="font-size:11px;padding:4px 10px">Clear</button>
  </div>
  <div id="log"></div>
</div>

</div><!-- end right -->
</div><!-- end grid -->

<script>
'use strict';

let currentSessionId = null;
let sseSource = null;

// ── Helpers ────────────────────────────────────────────────────────────────

function base() { return document.getElementById('base').value.replace(/\/$/, ''); }
function adamId() { return document.getElementById('adamId').value.trim(); }
function sf() { return document.getElementById('storefront').value.trim() || 'us'; }

function log(msg, cls = '') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = 'log-' + cls;
  line.textContent = new Date().toTimeString().slice(0,8) + '  ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById('log').innerHTML = ''; }
function logJSON(label, obj) {
  log(label, 'dim');
  log(JSON.stringify(obj, null, 2), 'json');
}

async function api(method, path, body) {
  const url = base() + path;
  log(`${method} ${path}`, 'dim');
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(url, opts);
    const text = await r.text();
    let data;
    try { data = JSON.parse(text); } catch { data = text; }
    if (r.ok) {
      log(`→ ${r.status}`, 'ok');
    } else {
      log(`→ ${r.status} ${r.statusText}: ${typeof data === 'string' ? data.trim() : JSON.stringify(data)}`, 'err');
    }
    return { ok: r.ok, status: r.status, data };
  } catch (e) {
    log(`✗ network error: ${e.message}`, 'err');
    return { ok: false, status: 0, data: null };
  }
}

function capToRequest(cap) {
  const req = { assetId: adamId(), storefront: sf(), capabilities: {} };
  if (cap === 'alac')  req.capabilities.lossless = true;
  if (cap === 'atmos') req.capabilities.atmos = true;
  if (cap === 'video') req.capabilities.video = true;
  return req;
}

// ── Status ─────────────────────────────────────────────────────────────────

async function checkStatus() {
  const { ok, data } = await api('GET', '/api/v1/status');
  const dot = document.getElementById('dot');
  const txt = document.getElementById('conn-text');
  dot.className = 'status-dot ' + (ok ? 'ok' : 'err');
  txt.textContent = ok ? `connected — ${data?.status ?? 'ok'}` : 'unreachable';
}

async function testStatus() {
  const { ok, data } = await api('GET', '/api/v1/status');
  if (ok) logJSON('status', data);
}

async function testCapabilities() {
  const { ok, data } = await api('GET', '/api/v1/capabilities');
  if (ok) logJSON('capabilities', data);
}

// ── Metadata / Artwork / Lyrics ────────────────────────────────────────────

async function testMetadata() {
  if (!adamId()) { log('enter an Adam ID first', 'warn'); return; }
  const { ok, data } = await api('GET', `/api/v1/metadata/${adamId()}?sf=${sf()}`);
  if (ok) {
    logJSON('metadata', data);
    const box = document.getElementById('meta-result');
    box.style.display = 'block';
    box.textContent = JSON.stringify(data, null, 2);
  }
}

async function testArtwork() {
  if (!adamId()) { log('enter an Adam ID first', 'warn'); return; }
  const url = `${base()}/api/v1/artwork/${adamId()}?sf=${sf()}&size=300`;
  log(`GET /api/v1/artwork/${adamId()} (displaying in page)`, 'dim');
  const img = document.getElementById('artwork-img');
  img.src = url;
  img.style.display = 'block';
  img.onerror = () => log('artwork load failed', 'err');
  img.onload  = () => log('artwork loaded OK', 'ok');
}

async function testLyrics() {
  if (!adamId()) { log('enter an Adam ID first', 'warn'); return; }
  const { ok, data } = await api('GET', `/api/v1/lyrics/${adamId()}?sf=${sf()}&format=lrc`);
  if (ok) {
    log(`lyrics: ${typeof data === 'string' ? data.slice(0,200) + '…' : JSON.stringify(data)}`, 'ok');
  }
}

// ── Error handling ─────────────────────────────────────────────────────────

async function testError(code) {
  if (code === 404) {
    const { status } = await api('GET', '/api/v1/metadata/000000000?sf=us');
    if (status === 404) log('✓ 404 returned correctly', 'ok');
    else log(`✗ expected 404, got ${status}`, 'err');
  } else if (code === 401) {
    // Hit playback without a session — should 404 (session not found), which
    // proves the auth check and session lookup are both working.
    const { status } = await api('GET', '/api/v1/playback/fakeid/audio');
    log(`session not found → ${status} (expected 404)`, status === 404 ? 'ok' : 'warn');
  }
}

async function testMetadataBadID() {
  const { status } = await api('GET', '/api/v1/metadata/notanid?sf=us');
  log(`bad metadata ID → ${status}`, status >= 400 ? 'ok' : 'err');
}

async function testLyricsUnavail() {
  // Use an instrumental track ID if you know one; otherwise just log the result.
  if (!adamId()) { log('enter an Adam ID first', 'warn'); return; }
  const { status } = await api('GET', `/api/v1/lyrics/${adamId()}?sf=us`);
  log(`lyrics status → ${status}`, 'dim');
}

// ── Playback ───────────────────────────────────────────────────────────────

async function createSession() {
  if (!adamId()) { log('enter an Adam ID first', 'warn'); return; }
  const cap = document.getElementById('quality').value;
  const { ok, data } = await api('POST', '/api/v1/playback', capToRequest(cap));
  if (!ok) return;
  currentSessionId = data.sessionId;
  logJSON('session', data);
  document.getElementById('session-info').textContent =
    `Session ${currentSessionId} · ${data.type} · ${data.codec || cap}`;

  const audioUrl = `${base()}/api/v1/playback/${currentSessionId}/audio`;
  const videoUrl = `${base()}/api/v1/playback/${currentSessionId}/video`;

  if (cap === 'video') {
    document.getElementById('video-section').style.display = 'block';
    document.getElementById('audio-section').style.display = 'none';
    document.getElementById('vplayer').src = videoUrl;
  } else {
    document.getElementById('audio-section').style.display = 'block';
    document.getElementById('video-section').style.display = 'none';
    document.getElementById('player').src = audioUrl;
  }
  log(`stream URL: ${audioUrl}`, 'dim');
}

async function deleteSession() {
  if (!currentSessionId) { log('no active session', 'warn'); return; }
  const { ok } = await api('DELETE', `/api/v1/playback/${currentSessionId}`);
  if (ok) {
    log(`session ${currentSessionId} released`, 'ok');
    currentSessionId = null;
    document.getElementById('session-info').textContent = 'No session.';
    document.getElementById('audio-section').style.display = 'none';
    document.getElementById('video-section').style.display = 'none';
  }
}

// ── Concurrent sessions ────────────────────────────────────────────────────

async function concurrentTest(n) {
  if (!adamId()) { log('enter an Adam ID first', 'warn'); return; }
  log(`Opening ${n} concurrent sessions…`, 'dim');
  const cap = document.getElementById('quality').value;
  const results = document.getElementById('concurrent-result');
  results.style.display = 'block';
  results.textContent = '';

  const promises = Array.from({ length: n }, (_, i) =>
    api('POST', '/api/v1/playback', capToRequest(cap)).then(r => ({ i, ...r }))
  );
  const settled = await Promise.allSettled(promises);
  const ids = [];
  let ok = 0;
  settled.forEach(({ value }) => {
    if (value?.ok) { ids.push(value.data.sessionId); ok++; }
  });
  results.textContent = `${ok}/${n} sessions opened\nIDs: ${ids.join(', ')}`;
  log(`concurrent: ${ok}/${n} succeeded`, ok === n ? 'ok' : 'warn');

  // Clean up
  for (const id of ids) {
    await api('DELETE', `/api/v1/playback/${id}`);
  }
  log(`${ids.length} sessions released`, 'dim');
}

async function cancelDuringStream() {
  if (!adamId()) { log('enter an Adam ID first', 'warn'); return; }
  const cap = document.getElementById('quality').value;
  const { ok, data } = await api('POST', '/api/v1/playback', capToRequest(cap));
  if (!ok) return;
  const sid = data.sessionId;
  log(`session ${sid} created; starting stream, cancelling in 500ms…`, 'dim');

  const ctrl = new AbortController();
  const streamUrl = `${base()}/api/v1/playback/${sid}/audio`;
  setTimeout(() => { ctrl.abort(); log('stream aborted by client', 'warn'); }, 500);

  try {
    await fetch(streamUrl, { signal: ctrl.signal });
  } catch (e) {
    log(`fetch aborted: ${e.name}`, 'ok');
  }
  await api('DELETE', `/api/v1/playback/${sid}`);
}

// ── Export ─────────────────────────────────────────────────────────────────

async function exportTrack() {
  if (!adamId()) { log('enter an Adam ID first', 'warn'); return; }
  const cap = document.getElementById('quality').value;
  const req = {
    assetId: adamId(),
    storefront: sf(),
    capabilities: {},
    outputDir: document.getElementById('exportDir').value || undefined,
    filenameTemplate: document.getElementById('tmpl').value,
    options: {
      embedArtwork:    document.getElementById('embedArt').checked,
      embedLyrics:     document.getElementById('embedLrc').checked,
      saveLrcSidecar:  document.getElementById('lrcSidecar').checked,
      convertToFlac:   document.getElementById('convertFlac').checked,
      overwritePolicy: 'skip',
    },
  };
  if (cap === 'alac')  req.capabilities.lossless = true;
  if (cap === 'atmos') req.capabilities.atmos = true;
  if (cap === 'video') req.capabilities.video = true;

  const { ok, data } = await api('POST', '/api/v1/export', req);
  if (ok) {
    logJSON('export job', data);
    const box = document.getElementById('export-result');
    box.style.display = 'block';
    box.textContent = JSON.stringify(data, null, 2);
    pollExport(data.jobId);
  }
}

async function pollExport(jobId) {
  log(`polling export job ${jobId}…`, 'dim');
  for (let i = 0; i < 120; i++) {
    await new Promise(r => setTimeout(r, 2000));
    const { ok, data } = await api('GET', `/api/v1/export/${jobId}`);
    if (!ok) break;
    const box = document.getElementById('export-result');
    box.textContent = JSON.stringify(data, null, 2);
    if (data.phase === 'done') {
      log(`✓ export done: ${data.output}`, 'ok');
      break;
    }
    if (data.phase === 'failed') {
      log(`✗ export failed: ${data.error}`, 'err');
      break;
    }
    if (data.phase === 'cancelled') {
      log('export cancelled', 'warn');
      break;
    }
    log(`export phase=${data.phase} ${data.percent}%`, 'dim');
  }
}

async function listExports() {
  const { ok, data } = await api('GET', '/api/v1/export');
  if (ok) {
    logJSON(`export jobs (${Array.isArray(data) ? data.length : '?'})`, data);
    const box = document.getElementById('export-result');
    box.style.display = 'block';
    box.textContent = JSON.stringify(data, null, 2);
  }
}

// ── SSE ────────────────────────────────────────────────────────────────────

function startSSE() {
  if (sseSource) { log('SSE already connected', 'warn'); return; }
  const url = base() + '/api/v1/events';
  log(`SSE → ${url}`, 'dim');
  sseSource = new EventSource(url);
  const pill = document.getElementById('sse-status');
  const sseLog = document.getElementById('sse-log');

  sseSource.onopen = () => {
    pill.textContent = 'connected';
    pill.className = 'pill active';
    log('SSE connected', 'ok');
  };
  sseSource.onmessage = e => {
    sseLog.textContent = e.data + '\n' + sseLog.textContent;
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'export') log(`SSE export: ${d.data.phase} ${d.data.percent}%`, 'dim');
    } catch {}
  };
  sseSource.onerror = () => {
    pill.textContent = 'error';
    pill.className = 'pill';
    log('SSE error / disconnected', 'err');
  };
}

function stopSSE() {
  if (sseSource) { sseSource.close(); sseSource = null; }
  document.getElementById('sse-status').textContent = 'disconnected';
  document.getElementById('sse-status').className = 'pill';
  log('SSE closed', 'dim');
}

// Auto-connect on load.
window.addEventListener('DOMContentLoaded', checkStatus);
</script>
</body>
</html>
